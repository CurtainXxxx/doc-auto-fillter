<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教务文档助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #4F6EF7;
  --primary-light: #6B85F9;
  --primary-bg: #EEF1FE;
  --bg: #F5F6FA;
  --white: #FFFFFF;
  --border: #E4E7ED;
  --text: #303133;
  --text-secondary: #909399;
  --success: #67C23A;
  --warning: #E6A23C;
  --danger: #F56C6C;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }

/* ── 整体布局 ── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── 左侧聊天区 ── */
.chat-panel {
  width: 440px; min-width: 380px; display: flex; flex-direction: column;
  background: var(--white); border-right: 1px solid var(--border);
}
.chat-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.chat-header .avatar {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px;
}
.chat-header .info h2 { font-size: 16px; font-weight: 600; }
.chat-header .info p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

/* 步骤条 */
.steps-bar {
  display: flex; border-bottom: 1px solid var(--border); background: #FAFBFD;
}
.steps-bar .step {
  flex: 1; text-align: center; padding: 8px 4px; font-size: 11px;
  color: var(--text-secondary); position: relative;
}
.steps-bar .step::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--border); border-radius: 1px;
}
.steps-bar .step.active { color: var(--primary); font-weight: 600; }
.steps-bar .step.active::after { background: var(--primary); }
.steps-bar .step.done { color: var(--success); }
.steps-bar .step.done::after { background: var(--success); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

.msg { display: flex; gap: 10px; max-width: 100%; }
.msg.user { flex-direction: row-reverse; }
.msg .bubble {
  max-width: 88%; padding: 10px 14px; border-radius: 12px; font-size: 14px;
  line-height: 1.7; white-space: pre-wrap; word-break: break-word;
}
.msg.assistant .bubble { background: var(--primary-bg); color: var(--text); border-top-left-radius: 4px; }
.msg.user .bubble { background: var(--primary); color: #fff; border-top-right-radius: 4px; }

.msg .icon {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.msg.assistant .icon { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; }
.msg.user .icon { background: #E8EAED; color: var(--text-secondary); }

/* 打字指示器 */
.typing-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
.typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); animation: bounce 1.4s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* 下载链接样式 */
.download-link {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 6px; padding: 8px 14px;
  background: var(--primary); color: #fff !important; border-radius: 8px; text-decoration: none;
  font-size: 13px; font-weight: 500; transition: background 0.2s;
}
.download-link:hover { background: var(--primary-light); }

/* 选择框样式 */
.choice-box {
  margin-top: 8px; padding: 8px 12px; background: var(--white); border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px;
}
.choice-box .choice-title { font-weight: 600; margin-bottom: 6px; color: var(--primary); }
.choice-box label {
  display: flex; align-items: center; gap: 6px; padding: 5px 8px; cursor: pointer;
  border-radius: 4px; transition: background 0.15s;
}
.choice-box label:hover { background: var(--primary-bg); }
.choice-box input[type="radio"] { accent-color: var(--primary); }

/* 文件上传卡片 */
.file-card {
  margin-top: 8px; padding: 10px 14px; background: #F0F9EB; border: 1px solid #E1F3D8;
  border-radius: 8px; font-size: 13px; display: flex; align-items: center; gap: 8px;
}
.file-card .file-icon { font-size: 20px; }
.file-card .file-info { flex: 1; }
.file-card .file-name { font-weight: 500; }
.file-card .file-size { color: var(--text-secondary); font-size: 11px; }

/* ── 功能面板 ── */
.func-panel {
  border-top: 1px solid var(--border); background: #FAFBFD;
}
.func-panel .func-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 16px;
}
.func-btn {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 8px; background: var(--white);
  cursor: pointer; transition: all 0.2s; font-size: 13px; font-family: inherit;
  color: var(--text);
}
.func-btn:hover { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }
.func-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; }
.func-btn .func-icon { font-size: 18px; }
.func-btn .func-text { text-align: left; }
.func-btn .func-text .title { font-weight: 600; font-size: 13px; }
.func-btn .func-text .desc { font-size: 11px; opacity: 0.7; margin-top: 1px; }

/* 输入区 */
.chat-input {
  padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end;
  background: var(--white);
}
.chat-input .upload-btn {
  width: 38px; height: 38px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--white); cursor: pointer; font-size: 16px; display: flex;
  align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
  color: var(--text-secondary); position: relative; overflow: hidden;
}
.chat-input .upload-btn:hover { border-color: var(--primary); color: var(--primary); }
.chat-input .upload-btn input[type="file"] {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
}
.chat-input textarea {
  flex: 1; resize: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; font-size: 14px; font-family: inherit; line-height: 1.5;
  max-height: 100px; outline: none; transition: border-color 0.2s;
}
.chat-input textarea:focus { border-color: var(--primary); }
.chat-input .send-btn {
  width: 38px; height: 38px; border: none; border-radius: 8px; cursor: pointer;
  background: var(--primary); color: #fff; font-size: 16px; display: flex;
  align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0;
}
.chat-input .send-btn:hover { background: var(--primary-light); }
.chat-input .send-btn:disabled { background: #C0C4CC; cursor: not-allowed; }

/* ── 右侧文档预览区 ── */
.preview-panel {
  flex: 1; display: flex; flex-direction: column; background: var(--bg); min-width: 0;
}
.preview-header {
  padding: 12px 24px; background: var(--white); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.preview-header .title-area { display: flex; align-items: center; gap: 10px; }
.preview-header .title-area h3 { font-size: 15px; font-weight: 600; }
.preview-header .actions { display: flex; gap: 8px; }
.preview-header .actions button {
  padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--white); font-size: 12px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 4px;
}
.preview-header .actions button:hover { border-color: var(--primary); color: var(--primary); }
.preview-header .actions button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.preview-header .actions button.primary:hover { background: var(--primary-light); }

.preview-body {
  flex: 1; overflow: auto; padding: 24px; display: flex; justify-content: center;
}
.preview-body::-webkit-scrollbar { width: 6px; }
.preview-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

/* 空状态 */
.empty-state { text-align: center; color: var(--text-secondary); margin-top: 80px; }
.empty-state .icon-big { font-size: 56px; margin-bottom: 12px; opacity: 0.3; }
.empty-state h4 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
.empty-state p { font-size: 13px; line-height: 1.6; }

/* 文档预览 - HTML渲染表格 */
.doc-page {
  background: var(--white); box-shadow: 0 1px 8px rgba(0,0,0,0.1);
  width: 100%; max-width: 900px; min-height: 600px; padding: 40px 48px;
  font-family: "FangSong", "仿宋", "SimSun", "宋体", serif; font-size: 12pt;
  line-height: 1.8; color: #000;
}
.doc-page h2 { text-align: center; font-size: 16pt; margin-bottom: 16px; font-weight: normal; letter-spacing: 2px; }
.doc-page table {
  width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 10.5pt;
}
.doc-page table th, .doc-page table td {
  border: 1px solid #000; padding: 4px 8px; text-align: center; vertical-align: middle;
}
.doc-page table th { background: #f5f5f5; font-weight: normal; }

/* 可点击的待填字段 */
.field-placeholder {
  display: inline-block; min-width: 60px; min-height: 20px; padding: 2px 8px;
  background: #EBF5FF; border: 1px dashed #409EFF; border-radius: 3px;
  cursor: pointer; color: #409EFF; font-size: 10.5pt; font-family: inherit;
  transition: all 0.2s; text-align: center;
}
.field-placeholder:hover { background: #D9ECFF; border-color: var(--primary); }
.field-placeholder.filled {
  background: #F0F9EB; border-color: var(--success); color: var(--text);
  border-style: solid;
}

/* 生成进度 */
.generating { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-top: 80px; }
.generating .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.generating p { font-size: 14px; color: var(--text-secondary); }

/* 文档完成卡片 */
.doc-done-card {
  background: var(--white); border-radius: 12px; box-shadow: var(--shadow);
  width: 100%; max-width: 500px; padding: 40px; text-align: center;
}
.doc-done-card .icon { font-size: 56px; margin-bottom: 12px; }
.doc-done-card h4 { font-size: 18px; margin-bottom: 6px; }
.doc-done-card p { color: var(--text-secondary); font-size: 13px; }
.doc-done-card .dl-btn {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; padding: 10px 24px;
  background: var(--primary); color: #fff; border-radius: 8px; text-decoration: none;
  font-size: 14px; font-weight: 500; transition: background 0.2s;
}
.doc-done-card .dl-btn:hover { background: var(--primary-light); }
.doc-done-card .checks {
  margin-top: 16px; text-align: left; background: #F0F9EB; border-radius: 8px;
  padding: 12px 16px; font-size: 13px; color: var(--success); line-height: 2;
}

/* 上传拖拽区 */
.upload-drop-zone {
  border: 2px dashed var(--border); border-radius: 12px; padding: 40px;
  text-align: center; cursor: pointer; transition: all 0.2s; margin-top: 40px;
  max-width: 500px; width: 100%;
}
.upload-drop-zone:hover, .upload-drop-zone.dragover { border-color: var(--primary); background: var(--primary-bg); }
.upload-drop-zone .icon { font-size: 40px; margin-bottom: 8px; opacity: 0.5; }
.upload-drop-zone p { font-size: 14px; color: var(--text-secondary); }
.upload-drop-zone .hint { font-size: 12px; color: #C0C4CC; margin-top: 4px; }

/* 响应式 */
@media (max-width: 900px) {
  .app { flex-direction: column; }
  .chat-panel { width: 100%; height: 55vh; min-width: auto; }
  .preview-panel { height: 45vh; }
}
</style>
</head>
<body>

<div class="app">
  <!-- 左侧聊天区 -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="avatar">🎓</div>
      <div class="info">
        <h2>教务文档助手</h2>
        <p>高校教务办公数字员工 · 在线</p>
      </div>
    </div>

    <!-- 步骤条 -->
    <div class="steps-bar" id="stepsBar">
      <div class="step">选择模板</div>
      <div class="step">识别字段</div>
      <div class="step">信息收集</div>
      <div class="step">核对确认</div>
      <div class="step">生成文档</div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <!-- 功能面板 -->
    <div class="func-panel">
      <div class="func-grid">
        <button class="func-btn" id="funcAutoFill" onclick="startAutoFill()">
          <span class="func-icon">🤖</span>
          <span class="func-text"><span class="title">完全自动填写</span><span class="desc">AI逐批收集一键生成</span></span>
        </button>
        <button class="func-btn" id="funcSelectFill" onclick="startSelectFill()" style="opacity:0.5;cursor:not-allowed;" title="开发中">
          <span class="func-icon">📌</span>
          <span class="func-text"><span class="title">指定位置填写</span><span class="desc">点击字段精准填充</span></span>
        </button>
        <button class="func-btn" id="funcCoFill" onclick="startCoFill()" style="opacity:0.5;cursor:not-allowed;" title="开发中">
          <span class="func-icon">✍️</span>
          <span class="func-text"><span class="title">人机协同填写</span><span class="desc">人工填写AI补全</span></span>
        </button>
        <button class="func-btn" id="funcUpload" onclick="triggerUpload()">
          <span class="func-icon">📎</span>
          <span class="func-text"><span class="title">知识文件上传</span><span class="desc">上传文件AI自动提取</span></span>
        </button>
      </div>
    </div>

    <!-- 输入区 -->
    <div class="chat-input">
      <div class="upload-btn" title="上传文件">
        📎
        <input type="file" id="fileInput" accept=".docx,.doc,.pdf,.xlsx,.xls,.csv,.txt" onchange="handleFileUpload(event)" />
      </div>
      <textarea id="userInput" rows="1" placeholder="请输入信息..." onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- 右侧文档预览区 -->
  <div class="preview-panel">
    <div class="preview-header">
      <div class="title-area">
        <h3 id="previewTitle">📄 文档预览</h3>
      </div>
      <div class="actions" id="previewActions" style="display:none;">
        <button onclick="downloadDoc()">⬇ 下载</button>
        <button class="primary" onclick="window.open(currentDownloadUrl)">打开链接</button>
      </div>
    </div>
    <div class="preview-body" id="previewBody">
      <div class="empty-state">
        <div class="icon-big">📋</div>
        <h4>文档预览区</h4>
        <p>选择模板并填写信息后<br>生成的文档将在此展示</p>
      </div>
    </div>
  </div>
</div>

<script>
// ── 状态 ──
let sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
let isStreaming = false;
let currentDownloadUrl = '';
let currentTemplate = '';
let currentStep = 0;  // 0=未开始 1=选模板 2=收集中 3=核对 4=生成中 5=完成
let currentMode = '';  // '' | 'auto' | 'select' | 'co'
let fieldData = {};    // 收集到的字段 {label: value}
let parsedFields = []; // 从Agent解析出的字段列表
let pendingChoices = null; // 等待用户选择的数据

// ── API ──
// 智能检测基础URL，确保前端请求能到达后端
function detectBaseUrl() {
  const origin = window.location.origin;
  // file:// 协议 = 本地直接打开HTML，无法连接后端
  if (origin.startsWith('file://')) {
    return null;
  }
  return origin;
}
const BASE_URL = detectBaseUrl();
const API_URL = BASE_URL ? BASE_URL + '/v1/chat/completions' : null;
const UPLOAD_URL = BASE_URL ? BASE_URL + '/upload' : null;
console.log('[教务文档助手] BASE_URL:', BASE_URL);

// 检测是否在正确的Web服务环境中
if (!BASE_URL || !API_URL) {
  // 不在Web服务环境中，显示引导提示
  window.addEventListener('load', () => {
    const body = document.getElementById('previewBody');
    body.innerHTML = `
      <div class="doc-done-card" style="border:2px solid var(--warning);">
        <div class="icon">⚠️</div>
        <h4>请通过Web服务访问</h4>
        <p style="margin:12px 0;line-height:2;">
          当前为静态文件预览，无法连接后端服务。<br>
          请点击Coze平台右上角 <strong>「部署」</strong> 按钮，<br>
          部署成功后通过访问链接打开此页面。<br><br>
          或者在浏览器中直接访问：<br>
          <code style="background:#f5f5f5;padding:4px 8px;border-radius:4px;font-size:13px;">
            https://你的项目域名/web/index.html
          </code>
        </p>
      </div>`;
    document.getElementById('userInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  });
}

// ── 自动调高 ──
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
}

// ── 发送消息 ──
async function sendMessage(text) {
  if (!API_URL) { alert('请通过部署后的Web服务URL访问，而非IDE文件预览'); return; }
  const input = document.getElementById('userInput');
  const msg = text || input.value.trim();
  if (!msg || isStreaming) return;

  if (!text) { input.value = ''; input.style.height = 'auto'; }
  appendMessage('user', msg);
  await callAgent(msg);
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ── 添加消息气泡 ──
function appendMessage(role, content, extra) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const icon = role === 'assistant' ? '🎓' : '👤';
  let bubbleHtml = escapeHtml(content);
  if (extra) bubbleHtml += extra;
  div.innerHTML = `<div class="icon">${icon}</div><div class="bubble">${bubbleHtml}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

// ── 创建流式消息气泡 ──
function createStreamingMessage() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `<div class="icon">🎓</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

// ── 调用 Agent ──
async function callAgent(userText) {
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  const msgDiv = createStreamingMessage();
  const bubble = msgDiv.querySelector('.bubble');

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'agent',
        messages: [{ role: 'user', content: userText }],
        stream: true,
        session_id: sessionId,
      }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta;
          if (delta?.content) {
            fullText += delta.content;
            bubble.innerHTML = renderMarkdown(fullText);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
          }
        } catch (e) {}
      }
    }

    postProcessResponse(fullText);

  } catch (err) {
    bubble.innerHTML = `<span style="color:var(--danger);">⚠ 请求失败: ${escapeHtml(err.message)}</span>`;
  } finally {
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ── 响应后处理 ──
function postProcessResponse(text) {
  // 检测下载链接
  const urlMatch = text.match(/https?:\/\/[^\s"<>]+\.docx[^\s"<>]*/);
  if (urlMatch) {
    currentDownloadUrl = urlMatch[0];
    currentStep = 5;
    updateStepBar();
    updatePreview('done');
    document.getElementById('previewActions').style.display = 'flex';
    return;
  }

  // 检测模板选择
  if (text.includes('评价报告') && (text.includes('试卷分析') || text.includes('关联矩阵')) && currentStep === 0) {
    currentStep = 1;
    updatePreview('template-select');
  }

  // 检测模板选定 → 调用解析
  if ((text.includes('评价报告') || text.includes('试卷分析') || text.includes('关联矩阵')) && currentStep === 1) {
    const tplMatch = text.match(/(评价报告|试卷分析|关联矩阵)/);
    if (tplMatch) currentTemplate = tplMatch[1];
  }

  // 检测字段收集
  if (text.includes('请填写') || text.includes('请提供') || text.includes('请输入')) {
    if (currentStep < 2) currentStep = 2;
    // 提取字段名
    const fieldMatches = text.matchAll(/(?:请填写|请提供|请输入)[：:]?\s*[-–]?\s*(?:【)?([^\n,，。】【]+?)(?:】)?/g);
    for (const m of fieldMatches) {
      if (m[1] && m[1].trim().length < 20) {
        const label = m[1].trim();
        if (!parsedFields.includes(label)) parsedFields.push(label);
      }
    }
    updatePreview('collecting');
  }

  // 检测收集到的字段值
  const kvMatches = text.matchAll(/[-–]\s*(.+?)[：:]\s*(.+)/g);
  for (const m of kvMatches) {
    const key = m[1].trim();
    const val = m[2].trim();
    if (key && val && key.length < 20) fieldData[key] = val;
  }

  // 检测核对
  if (text.includes('核对') || text.includes('确认')) {
    if (currentStep < 3) currentStep = 3;
    updatePreview('confirm');
  }

  // 检测生成中
  if (text.includes('正在') && (text.includes('生成') || text.includes('渲染'))) {
    currentStep = 4;
    updatePreview('generating');
  }

  // 检测需要信息提示（用于知识上传场景）
  if (text.includes('缺少') || text.includes('缺失') || text.includes('未提供')) {
    highlightUploadBtn();
  }

  // 检测选择项
  const choicesMatch = text.match(/[①②③④⑤⑥⑦⑧⑨⑩]/g);

  updateStepBar();
}

function updateStepBar() {
  const bar = document.getElementById('stepsBar');
  const items = bar.querySelectorAll('.step');
  items.forEach((el, i) => {
    el.className = 'step';
    if (i < currentStep) el.classList.add('done');
    else if (i === currentStep) el.classList.add('active');
  });
}

}

async function handleFileUpload(event) {
  if (!UPLOAD_URL) { alert('请通过部署后的Web服务URL访问，而非IDE文件预览'); return; }
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = ''; // 重置

  // 在聊天中显示文件卡片
  const sizeStr = file.size < 1024*1024 ? (file.size/1024).toFixed(1)+'KB' : (file.size/1024/1024).toFixed(1)+'MB';
  appendMessage('user', `📎 上传了文件：${file.name}（${sizeStr}）`);

  // 上传文件
  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
    if (!resp.ok) throw new Error(`上传失败 HTTP ${resp.status}`);
    const result = await resp.json();

    if (result.success && result.extracted_text) {
      // 把提取的内容发送给Agent
      const agentMsg = `我上传了文件"${file.name}"，以下是文件内容，请从中提取填写文档所需的信息：\n\n${result.extracted_text.substring(0, 3000)}`;
      await callAgent(agentMsg);
    } else {
      appendMessage('assistant', `⚠ 文件解析失败：${result.error || '未知错误'}，请尝试其他格式或直接输入信息。`);
    }
  } catch (err) {
    appendMessage('assistant', `⚠ 文件上传失败：${escapeHtml(err.message)}，请检查网络后重试。`);
  }
}

function highlightUploadBtn() {
  const btn = document.getElementById('funcUpload');

}

            <tr><td>2</td><td style="cursor:pointer;color:var(--primary);" onclick="sendMessage('2')">试卷分析</td><td>试卷分析表（考勤+分数分布）</td></tr>
            <tr><td>3</td><td style="cursor:pointer;color:var(--primary);" onclick="sendMessage('3')">关联矩阵</td><td>考题与课程目标关联矩阵</td></tr>
          </table>

        </div>`;
      break;

    case 'collecting':
      title.textContent = `📝 信息收集 - ${currentTemplate || ''}`;
      renderDocPreview();
      break;

    case 'confirm':
      title.textContent = '✅ 核对确认';
      renderDocPreview();
      break;

    case 'generating':
      title.textContent = '⏳ 生成中...';
      body.innerHTML = `<div class="generating"><div class="spinner"></div><p>正在生成文档，请稍候...</p></div>`;
      break;

    case 'done':
      title.textContent = '📄 文档已生成';
      body.innerHTML = `
        <div class="doc-done-card">
          <div class="icon">🎉</div>
          <h4>文档生成成功！</h4>
          <p>格式与模板100%一致</p>
          <a href="${currentDownloadUrl}" target="_blank" class="dl-btn">📥 下载Word文档</a>
          <div class="checks">
            ✅ 文档格式与模板完全一致<br>
            ✅ 所有字段已正确填入<br>
            ✅ 链接24小时内有效
          </div>
        </div>`;
      break;

    default:
      title.textContent = '📄 文档预览';
      body.innerHTML = `<div class="empty-state"><div class="icon-big">📋</div><h4>文档预览区</h4><p>选择模板并填写信息后<br>生成的文档将在此展示</p></div>`;
  }
}

// ── 渲染文档HTML预览（基于收集到的字段数据） ──
function renderDocPreview() {
  const body = document.getElementById('previewBody');

  // 基础信息字段
  const basicFields = ['课程名称','课程代码','开课学期','授课教师','学分','学时','课程性质'];
  // 课程目标组
  const goalFields = ['实现途径','评价方法'];

  let basicHtml = '';
  for (const f of basicFields) {
    const val = fieldData[f] || '';
    const cls = val ? 'filled' : '';
    const display = val || '待填写';
    basicHtml += `<tr><td style="width:90px;text-align:right;font-weight:500;">${f}：</td>
      <td><span class="field-placeholder ${cls}">${display}</span></td></tr>`;
  }

  // 课程目标行（最多12组）
  let goalRows = '';
  for (let i = 1; i <= 12; i++) {
    const approach = fieldData[`实现途径${i}`] || fieldData['实现途径'] || '';
    const method = fieldData[`评价方法${i}`] || fieldData['评价方法'] || '';
    if (i <= 4 || approach || method) {  // 显示前4组或有数据的
      const aCls = approach ? 'filled' : '';
      const mCls = method ? 'filled' : '';
      goalRows += `<tr>
        <td style="width:50px;">目标${i}</td>
        <td><span class="field-placeholder ${aCls}">${approach || '待填写'}</span></td>
        <td><span class="field-placeholder ${mCls}">${method || '待填写'}</span></td>
      </tr>`;
    }
  }

  if (!goalRows) {
    goalRows = `<tr><td colspan="3" style="color:var(--text-secondary);">课程目标信息收集后显示</td></tr>`;
  }

  // 总结和改进措施
  const summary = fieldData['课程总结'] || '';
  const improve = fieldData['改进措施'] || '';

  body.innerHTML = `
    <div class="doc-page">
      <h2>${currentTemplate || '教务文档'}</h2>

      <table>
        <tr><th colspan="2" style="background:#f0f0f0;font-weight:600;">基本信息</th></tr>
        ${basicHtml}
      </table>

      <table>
        <tr><th style="width:50px;">序号</th><th>实现途径</th><th>评价方法</th></tr>
        ${goalRows}
      </table>

      <table>
        <tr><td style="width:90px;text-align:right;font-weight:500;">课程总结：</td>
          <td><span class="field-placeholder ${summary?'filled':''}">${summary || '待填写'}</span></td></tr>
        <tr><td style="text-align:right;font-weight:500;">改进措施：</td>
          <td><span class="field-placeholder ${improve?'filled':''}">${improve || '待填写'}</span></td></tr>
      </table>

      <p style="font-size:10px;color:var(--text-secondary);margin-top:12px;text-align:center;">
        📝 以上为HTML预览，生成Word文档格式与模板100%一致
      </p>
    </div>`;
}

// ── Markdown渲染 ──
function renderMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/(https?:\/\/[^\s"<>]+\.docx[^\s"<>]*)/g,
    '<a class="download-link" href="$1" target="_blank">📥 下载文档</a>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/^- (.+)$/gm, '<div style="padding-left:12px;">• $1</div>');
  html = html.replace(/^\d+\. (.+)$/gm, '<div style="padding-left:12px;">$1</div>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
