<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教务文档助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #4F46E5;
  --primary-light: #6366F1;
  --primary-lighter: #EEF2FF;
  --primary-soft: #F5F3FF;
  --bg: #F8F9FC;
  --surface: #FFFFFF;
  --border: #E8EBF0;
  --border-light: #F0F2F5;
  --text: #1E1E2E;
  --text-secondary: #8B8FA3;
  --text-muted: #B0B5C6;
  --success: #10B981;
  --success-bg: #ECFDF5;
  --success-border: #A7F3D0;
  --warning: #F59E0B;
  --danger: #EF4444;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
  gap: 0;
}

/* ── Left Panel: Chat ── */
.chat-panel {
  width: 420px;
  min-width: 360px;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: relative;
}

/* Header */
.chat-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border-light);
}
.chat-header .avatar {
  width: 42px; height: 42px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--primary), #818CF8);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 20px;
  box-shadow: 0 2px 8px rgba(79,70,229,0.25);
}
.chat-header .info h2 {
  font-size: 16px; font-weight: 600; color: var(--text);
  letter-spacing: -0.01em;
}
.chat-header .info p {
  font-size: 12px; color: var(--text-secondary); margin-top: 1px;
  display: flex; align-items: center; gap: 6px;
}
.chat-header .info p::before {
  content: ''; display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 0 3px var(--success-bg);
}

/* Steps Bar */
.steps-bar {
  display: flex;
  padding: 12px 16px;
  gap: 4px;
  border-bottom: 1px solid var(--border-light);
}
.steps-bar .step {
  flex: 1;
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  position: relative;
  padding-top: 18px;
  transition: color 0.3s;
  white-space: nowrap;
}
.steps-bar .step::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.3s;
  z-index: 2;
}
.steps-bar .step::after {
  content: '';
  position: absolute;
  top: 3px;
  left: calc(50% + 16px);
  right: calc(-50% + 16px);
  height: 2px;
  background: var(--border);
  transition: background 0.3s;
  z-index: 1;
}
.steps-bar .step:last-child::after { display: none; }
.steps-bar .step.active {
  color: var(--primary);
  font-weight: 600;
}
.steps-bar .step.active::before {
  background: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-lighter);
  width: 10px; height: 10px;
  top: -1px;
}
.steps-bar .step.active::after { background: var(--primary-light); }
.steps-bar .step.done {
  color: var(--success);
}
.steps-bar .step.done::before {
  background: var(--success);
  box-shadow: 0 0 0 3px var(--success-bg);
}
.steps-bar .step.done::after { background: var(--success); }

/* Chat Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: #D0D5DD; border-radius: 4px; }

/* Message Bubbles */
.msg {
  display: flex;
  gap: 10px;
  max-width: 100%;
  animation: fadeIn 0.25s ease;
}
.msg.user { flex-direction: row-reverse; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg .avatar-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  align-self: flex-end;
}
.msg.assistant .avatar-icon {
  background: linear-gradient(135deg, var(--primary), #818CF8);
  color: #fff;
  box-shadow: 0 1px 4px rgba(79,70,229,0.2);
}
.msg.user .avatar-icon {
  background: #F1F3F8;
  color: var(--text-secondary);
}

.msg .bubble {
  max-width: 84%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.assistant .bubble {
  background: var(--primary-soft);
  color: var(--text);
  border-bottom-left-radius: 6px;
}
.msg.user .bubble {
  background: var(--primary);
  color: #fff;
  border-bottom-right-radius: 6px;
  box-shadow: 0 2px 8px rgba(79,70,229,0.2);
}

/* Typing dots */
.typing-dots {
  display: inline-flex; gap: 4px; padding: 4px 2px;
}
.typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: bounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Download link in bubble */
.download-link {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 8px; padding: 8px 16px;
  background: var(--primary); color: #fff !important;
  border-radius: var(--radius-sm); text-decoration: none;
  font-size: 13px; font-weight: 500;
  transition: all 0.2s;
  box-shadow: 0 2px 6px rgba(79,70,229,0.2);
}
.download-link:hover {
  background: var(--primary-light);
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
  transform: translateY(-1px);
}

/* Choice box in bubble */
.choice-box {
  margin-top: 8px; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px;
}
.choice-box .choice-title {
  font-weight: 600; margin-bottom: 8px;
  color: var(--primary); font-size: 12px; text-transform: uppercase;
  letter-spacing: 0.05em;
}
.choice-box label {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; cursor: pointer;
  border-radius: 6px; transition: background 0.15s;
}
.choice-box label:hover { background: var(--primary-soft); }
.choice-box input[type="radio"] { accent-color: var(--primary); }

/* File card */
.file-card {
  margin-top: 8px; padding: 12px 14px;
  background: var(--success-bg); border: 1px solid var(--success-border);
  border-radius: var(--radius-sm); font-size: 13px;
  display: flex; align-items: center; gap: 10px;
}
.file-card .file-icon { font-size: 22px; }
.file-card .file-info { flex: 1; }
.file-card .file-name { font-weight: 500; color: var(--text); }
.file-card .file-size { color: var(--text-secondary); font-size: 11px; }

/* ── Function Panel ── */
.func-panel {
  border-top: 1px solid var(--border);
  background: #FAFBFC;
  padding: 12px 16px;
}
.func-panel .func-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.func-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
  font-family: inherit;
  color: var(--text);
  text-align: left;
}
.func-btn:hover {
  border-color: var(--primary-light);
  background: var(--primary-soft);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}
.func-btn .func-icon {
  font-size: 20px;
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--primary-soft);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.func-btn:hover .func-icon {
  background: var(--primary);
}
.func-btn .func-text { line-height: 1.4; }
.func-btn .func-text .title {
  font-weight: 600; font-size: 12px; display: block;
}
.func-btn .func-text .desc {
  font-size: 10.5px; color: var(--text-secondary);
  display: block; margin-top: 1px;
}

.func-btn.active {
  border-color: var(--primary);
  background: var(--primary-lighter);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.08);
}
.func-btn.active .func-icon {
  background: var(--primary);
  color: #fff;
}
.func-btn.active .func-text .title { color: var(--primary); }
.func-btn.active .func-text .desc { color: var(--primary-light); }

/* ── Chat Input ── */
.chat-input {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--surface);
}
.chat-input .upload-btn {
  width: 40px; height: 40px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
  color: var(--text-secondary); position: relative; overflow: hidden;
}
.chat-input .upload-btn:hover {
  border-color: var(--primary-light);
  color: var(--primary);
  background: var(--primary-soft);
}
.chat-input .upload-btn input[type="file"] {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; opacity: 0; cursor: pointer;
}
.chat-input textarea {
  flex: 1; resize: none;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 13.5px; font-family: inherit; line-height: 1.5;
  max-height: 100px; outline: none;
  transition: all 0.2s;
  background: #FAFBFC;
}
.chat-input textarea:focus {
  border-color: var(--primary);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.06);
}
.chat-input textarea::placeholder { color: var(--text-muted); }
.chat-input .send-btn {
  width: 40px; height: 40px;
  border: none; border-radius: var(--radius);
  cursor: pointer;
  background: var(--primary); color: #fff; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(79,70,229,0.25);
}
.chat-input .send-btn:hover {
  background: var(--primary-light);
  box-shadow: 0 4px 12px rgba(79,70,229,0.35);
  transform: translateY(-1px);
}
.chat-input .send-btn:active { transform: scale(0.96); }
.chat-input .send-btn:disabled {
  background: #D1D5DB; cursor: not-allowed;
  box-shadow: none; transform: none;
}

/* ── Right Panel: Preview ── */
.preview-panel {
  flex: 1;
  display: flex; flex-direction: column;
  background: linear-gradient(180deg, #FBFCFE 0%, #F5F7FA 100%);
  min-width: 0;
}
.preview-header {
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.preview-header .title-area {
  display: flex; align-items: center; gap: 10px;
}
.preview-header .title-area h3 {
  font-size: 15px; font-weight: 600; color: var(--text);
}
.preview-header .actions {
  display: flex; gap: 8px;
}
.preview-header .actions button {
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 12.5px; cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
  color: var(--text-secondary);
  font-family: inherit;
}
.preview-header .actions button:hover {
  border-color: var(--primary-light);
  color: var(--primary);
}
.preview-header .actions button.primary {
  background: var(--primary); color: #fff;
  border-color: var(--primary);
  box-shadow: 0 2px 6px rgba(79,70,229,0.2);
}
.preview-header .actions button.primary:hover {
  background: var(--primary-light);
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
}

.preview-body {
  flex: 1; overflow: auto;
  padding: 32px;
  display: flex; justify-content: center;
  align-items: flex-start;
}
.preview-body::-webkit-scrollbar { width: 5px; }
.preview-body::-webkit-scrollbar-track { background: transparent; }
.preview-body::-webkit-scrollbar-thumb { background: #D0D5DD; border-radius: 4px; }

/* Empty State */
.empty-state {
  text-align: center;
  color: var(--text-secondary);
  margin-top: 80px;
  max-width: 320px;
}
.empty-state .icon-wrap {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--primary-soft);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-size: 32px;
}
.empty-state h4 {
  font-size: 16px; color: var(--text); margin-bottom: 8px;
  font-weight: 600;
}
.empty-state p {
  font-size: 13px; line-height: 1.7; color: var(--text-secondary);
}

/* Document Page Preview */
.doc-page {
  background: var(--surface);
  box-shadow: var(--shadow-md);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 860px;
  min-height: 540px;
  padding: 44px 52px;
  font-family: "FangSong", "仿宋", "SimSun", "宋体", serif;
  font-size: 12pt;
  line-height: 1.8;
  color: #1a1a1a;
}
.doc-page h2 {
  text-align: center; font-size: 17pt;
  margin-bottom: 24px; font-weight: normal;
  letter-spacing: 2px; color: #000;
}
.doc-page table {
  width: 100%; border-collapse: collapse;
  margin-bottom: 16px; font-size: 10.5pt;
}
.doc-page table th, .doc-page table td {
  border: 1px solid #d0d0d0; padding: 6px 10px;
  text-align: center; vertical-align: middle;
}
.doc-page table th {
  background: #F9FAFB; font-weight: 500;
  color: var(--text-secondary); font-size: 10.5pt;
}

/* Fillable field placeholder */
.field-placeholder {
  display: inline-block; min-width: 60px; min-height: 22px;
  padding: 3px 10px;
  background: #EFF6FF; border: 1.5px dashed #93C5FD;
  border-radius: 4px; cursor: pointer;
  color: #3B82F6; font-size: 10.5pt; font-family: inherit;
  transition: all 0.2s; text-align: center;
}
.field-placeholder:hover {
  background: #DBEAFE; border-color: #60A5FA;
}
.field-placeholder.filled {
  background: #ECFDF5; border-color: #6EE7B7;
  color: var(--text); border-style: solid;
}

/* Generating spinner */
.generating {
  display: flex; flex-direction: column; align-items: center;
  gap: 20px; margin-top: 100px;
}
.generating .spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.generating p {
  font-size: 14px; color: var(--text-secondary);
}

/* Document Done Card */
.doc-done-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  width: 100%; max-width: 480px;
  padding: 44px; text-align: center;
}
.doc-done-card .icon {
  font-size: 52px; margin-bottom: 16px;
}
.doc-done-card h4 {
  font-size: 18px; font-weight: 600; margin-bottom: 8px;
}
.doc-done-card p {
  color: var(--text-secondary); font-size: 13px;
}
.doc-done-card .dl-btn {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 20px; padding: 12px 28px;
  background: var(--primary); color: #fff;
  border-radius: var(--radius); text-decoration: none;
  font-size: 14px; font-weight: 500;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(79,70,229,0.25);
}
.doc-done-card .dl-btn:hover {
  background: var(--primary-light);
  box-shadow: 0 6px 20px rgba(79,70,229,0.35);
  transform: translateY(-1px);
}
.doc-done-card .checks {
  margin-top: 20px; text-align: left;
  background: var(--success-bg);
  border-radius: var(--radius-sm);
  padding: 14px 18px; font-size: 13px;
  color: var(--success); line-height: 2;
}

/* Template select table */
.template-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
}
.template-table th {
  background: #F9FAFB; color: var(--text-secondary);
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.05em; padding: 10px 14px;
}
.template-table td {
  padding: 14px;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.template-table tr:last-child td { border-bottom: none; }
.template-table .tpl-link {
  color: var(--primary); cursor: pointer;
  font-weight: 500;
  transition: color 0.2s;
}
.template-table .tpl-link:hover {
  color: var(--primary-light);
}

/* Upload drop zone */
.upload-drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 48px; text-align: center;
  cursor: pointer; transition: all 0.25s;
  width: 100%; max-width: 460px;
}
.upload-drop-zone:hover, .upload-drop-zone.dragover {
  border-color: var(--primary);
  background: var(--primary-soft);
}
.upload-drop-zone .icon {
  font-size: 40px; margin-bottom: 12px; opacity: 0.4;
}
.upload-drop-zone p { font-size: 14px; color: var(--text-secondary); }
.upload-drop-zone .hint {
  font-size: 12px; color: var(--text-muted); margin-top: 6px;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .app { flex-direction: column; }
  .chat-panel { width: 100%; height: 55vh; min-width: auto; }
  .preview-panel { height: 45vh; }
  .doc-page { padding: 24px 20px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- ── Left: Chat Panel ── -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="avatar">🎓</div>
      <div class="info">
        <h2>教务文档助手</h2>
        <p>数字员工 · 在线</p>
      </div>
    </div>

    <div class="steps-bar" id="stepsBar">
      <div class="step">选择模板</div>
      <div class="step">识别字段</div>
      <div class="step">信息收集</div>
      <div class="step">核对确认</div>
      <div class="step">生成文档</div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="func-panel">
      <div class="func-grid">
        <button class="func-btn" id="funcAutoFill" onclick="startAutoFill()">
          <span class="func-icon">🤖</span>
          <span class="func-text"><span class="title">完全自动填写</span><span class="desc">AI逐批收集一键生成</span></span>
        </button>
        <button class="func-btn" id="funcSelectFill" onclick="startSelectFill()" style="opacity:0.45;cursor:not-allowed;" title="开发中">
          <span class="func-icon">📌</span>
          <span class="func-text"><span class="title">指定位置填写</span><span class="desc">点击字段精准填充</span></span>
        </button>
        <button class="func-btn" id="funcCoFill" onclick="startCoFill()" style="opacity:0.45;cursor:not-allowed;" title="开发中">
          <span class="func-icon">✍️</span>
          <span class="func-text"><span class="title">人机协同填写</span><span class="desc">人工填写AI补全</span></span>
        </button>
        <button class="func-btn" id="funcUpload" onclick="triggerUpload()">
          <span class="func-icon">📎</span>
          <span class="func-text"><span class="title">知识文件上传</span><span class="desc">上传文件AI自动提取</span></span>
        </button>
      </div>
    </div>

    <div class="chat-input">
      <div class="upload-btn" title="上传文件">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        <input type="file" id="fileInput" accept=".docx,.doc,.pdf,.xlsx,.xls,.csv,.txt" onchange="handleFileUpload(event)" />
      </div>
      <textarea id="userInput" rows="1" placeholder="输入消息..." onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Right: Preview Panel ── -->
  <div class="preview-panel">
    <div class="preview-header">
      <div class="title-area">
        <h3 id="previewTitle">文档预览</h3>
      </div>
      <div class="actions" id="previewActions" style="display:none;">
        <button onclick="downloadDoc()">下载</button>
        <button class="primary" onclick="window.open(currentDownloadUrl)">打开链接</button>
      </div>
    </div>
    <div class="preview-body" id="previewBody">
      <div class="empty-state">
        <div class="icon-wrap">📋</div>
        <h4>文档预览区</h4>
        <p>选择模板并填写信息后，生成的文档将在此实时展示。</p>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
let sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
let isStreaming = false;
let currentDownloadUrl = '';
let currentTemplate = '';
let currentStep = 0;
let currentMode = '';
let fieldData = {};
let parsedFields = [];
let pendingChoices = null;

// ── API ──
function detectBaseUrl() {
  const origin = window.location.origin;
  if (origin.startsWith('file://')) return null;
  return origin;
}
const BASE_URL = detectBaseUrl();
const API_URL = BASE_URL ? BASE_URL + '/v1/chat/completions' : null;
const UPLOAD_URL = BASE_URL ? BASE_URL + '/upload' : null;

if (!BASE_URL || !API_URL) {
  window.addEventListener('load', () => {
    const body = document.getElementById('previewBody');
    body.innerHTML = `
      <div class="doc-done-card" style="border:2px solid #FDE68A;">
        <div class="icon">⚠️</div>
        <h4>请通过 Web 服务访问</h4>
        <p style="margin:12px 0;line-height:2;">
          当前为静态文件预览，无法连接后端服务。<br>
          请在 Coze 平台右上角点击 <strong>「部署」</strong>，<br>
          通过部署链接打开此页面。
        </p>
      </div>`;
    document.getElementById('userInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  });
}

// ── Auto-resize textarea ──
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
}

// ── Send Message ──
async function sendMessage(text) {
  if (!API_URL) { alert('请通过部署后的 Web 服务 URL 访问。'); return; }
  const input = document.getElementById('userInput');
  const msg = text || input.value.trim();
  if (!msg || isStreaming) return;

  if (!text) { input.value = ''; input.style.height = 'auto'; }
  appendMessage('user', msg);
  await callAgent(msg);
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ── Append Message ──
function appendMessage(role, content, extra) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const icon = role === 'assistant' ? '🎓' : '👤';
  let bubbleHtml = escapeHtml(content);
  if (extra) bubbleHtml += extra;
  div.innerHTML = `<div class="avatar-icon">${icon}</div><div class="bubble">${bubbleHtml}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

// ── Create Streaming Bubble ──
function createStreamingMessage() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `<div class="avatar-icon">🎓</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

// ── Call Agent ──
async function callAgent(userText) {
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  const msgDiv = createStreamingMessage();
  const bubble = msgDiv.querySelector('.bubble');

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'agent',
        messages: [{ role: 'user', content: userText }],
        stream: true,
        session_id: sessionId,
      }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta;
          if (delta?.content) {
            fullText += delta.content;
            bubble.innerHTML = renderMarkdown(fullText);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
          }
        } catch (e) {}
      }
    }

    postProcessResponse(fullText);

  } catch (err) {
    bubble.innerHTML = `<span style="color:var(--danger);">请求失败: ${escapeHtml(err.message)}</span>`;
  } finally {
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }
}

// ── Post-process Response ──
function postProcessResponse(text) {
  const urlMatch = text.match(/https?:\/\/[^\s"<>]+\.docx[^\s"<>]*/);
  if (urlMatch) {
    currentDownloadUrl = urlMatch[0];
    currentStep = 5; updateStepBar();
    updatePreview('done');
    document.getElementById('previewActions').style.display = 'flex';
    return;
  }

  if (text.includes('评价报告') && (text.includes('试卷分析') || text.includes('关联矩阵')) && currentStep === 0) {
    currentStep = 1; updatePreview('template-select');
  }

  if ((text.includes('评价报告') || text.includes('试卷分析') || text.includes('关联矩阵')) && currentStep === 1) {
    const tplMatch = text.match(/(评价报告|试卷分析|关联矩阵)/);
    if (tplMatch) currentTemplate = tplMatch[1];
  }

  if (text.includes('请填写') || text.includes('请提供') || text.includes('请输入')) {
    if (currentStep < 2) currentStep = 2;
    const fieldMatches = text.matchAll(/(?:请填写|请提供|请输入)[：:]?\s*[-–]?\s*(?:【)?([^\n,，。】【]+?)(?:】)?/g);
    for (const m of fieldMatches) {
      if (m[1] && m[1].trim().length < 20) {
        const label = m[1].trim();
        if (!parsedFields.includes(label)) parsedFields.push(label);
      }
    }
    updatePreview('collecting');
  }

  const kvMatches = text.matchAll(/[-–]\s*(.+?)[：:]\s*(.+)/g);
  for (const m of kvMatches) {
    const key = m[1].trim();
    const val = m[2].trim();
    if (key && val && key.length < 20) fieldData[key] = val;
  }

  if (text.includes('核对') || text.includes('确认')) {
    if (currentStep < 3) currentStep = 3;
    updatePreview('confirm');
  }

  if (text.includes('正在') && (text.includes('生成') || text.includes('渲染'))) {
    currentStep = 4; updatePreview('generating');
  }

  if (text.includes('缺少') || text.includes('缺失') || text.includes('未提供')) {
    highlightUploadBtn();
  }

  updateStepBar();
}

function updateStepBar() {
  const bar = document.getElementById('stepsBar');
  const items = bar.querySelectorAll('.step');
  items.forEach((el, i) => {
    el.className = 'step';
    if (i < currentStep) el.classList.add('done');
    else if (i === currentStep) el.classList.add('active');
  });
}

// ── Function 1: Auto Fill ──
async function startAutoFill() {
  if (isStreaming) return;
  currentMode = 'auto';
  document.querySelectorAll('.func-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('funcAutoFill').classList.add('active');

  if (currentStep === 0) {
    appendMessage('user', '启动完全自动填写模式');
    await callAgent('你好，我要使用完全自动填写模式生成教务文档，请展示可用模板');
  } else {
    appendMessage('user', '继续自动填写');
    await callAgent('继续收集信息');
  }
}

function startSelectFill() {}
function startCoFill() {}

// ── Function 4: File Upload ──
function triggerUpload() {
  document.getElementById('fileInput').click();
}

async function handleFileUpload(event) {
  if (!UPLOAD_URL) { alert('请通过部署后的 Web 服务 URL 访问。'); return; }
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const sizeStr = file.size < 1024*1024 ? (file.size/1024).toFixed(1)+'KB' : (file.size/1024/1024).toFixed(1)+'MB';
  appendMessage('user', `上传了文件: ${file.name}（${sizeStr}）`);

  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
    if (!resp.ok) throw new Error(`上传失败 HTTP ${resp.status}`);
    const result = await resp.json();

    if (result.success && result.extracted_text) {
      const agentMsg = `我上传了文件"${file.name}"，以下是文件内容，请从中提取填写文档所需的信息：\n\n${result.extracted_text.substring(0, 3000)}`;
      await callAgent(agentMsg);
    } else {
      appendMessage('assistant', `文件解析失败：${result.error || '未知错误'}，请尝试其他格式或直接输入信息。`);
    }
  } catch (err) {
    appendMessage('assistant', `文件上传失败：${escapeHtml(err.message)}，请检查网络后重试。`);
  }
}

function highlightUploadBtn() {
  const btn = document.getElementById('funcUpload');
  btn.style.animation = 'pulse 1s ease 3';
  setTimeout(() => btn.style.animation = '', 3000);
}

// ── Update Preview ──
function updatePreview(state) {
  const body = document.getElementById('previewBody');
  const title = document.getElementById('previewTitle');

  switch(state) {
    case 'template-select':
      title.textContent = '选择模板';
      body.innerHTML = `
        <div class="doc-page" style="max-width:520px;padding:36px;">
          <h2>可选教务文档模板</h2>
          <table class="template-table">
            <tr><th style="width:50px;"></th><th>模板名称</th><th style="width:200px;">说明</th></tr>
            <tr><td style="color:var(--text-muted);">1</td><td><span class="tpl-link" onclick="sendMessage('1')">评价报告</span></td><td style="color:var(--text-secondary);">专业课程目标达成度评价报告</td></tr>
            <tr><td style="color:var(--text-muted);">2</td><td><span class="tpl-link" onclick="sendMessage('2')">试卷分析</span></td><td style="color:var(--text-secondary);">试卷分析表（考勤+分数分布）</td></tr>
            <tr><td style="color:var(--text-muted);">3</td><td><span class="tpl-link" onclick="sendMessage('3')">关联矩阵</span></td><td style="color:var(--text-secondary);">考题与课程目标关联矩阵</td></tr>
          </table>
          <p style="font-size:11px;color:var(--text-muted);margin-top:12px;text-align:center;">点击模板名称或回复编号选择</p>
        </div>`;
      break;

    case 'collecting':
      title.textContent = `信息收集${currentTemplate ? ' · ' + currentTemplate : ''}`;
      renderDocPreview();
      break;

    case 'confirm':
      title.textContent = '核对确认';
      renderDocPreview();
      break;

    case 'generating':
      title.textContent = '生成中...';
      body.innerHTML = `<div class="generating"><div class="spinner"></div><p>正在生成文档，请稍候...</p></div>`;
      break;

    case 'done':
      title.textContent = '文档已生成';
      body.innerHTML = `
        <div class="doc-done-card">
          <div class="icon">🎉</div>
          <h4>文档生成成功</h4>
          <p>格式与模板 100% 一致</p>
          <a href="${currentDownloadUrl}" target="_blank" class="dl-btn">下载 Word 文档</a>
          <div class="checks">
            · 文档格式与模板完全一致<br>
            · 所有字段已正确填入<br>
            · 链接 24 小时内有效
          </div>
        </div>`;
      break;

    default:
      title.textContent = '文档预览';
      body.innerHTML = `<div class="empty-state"><div class="icon-wrap">📋</div><h4>文档预览区</h4><p>选择模板并填写信息后，生成的文档将在此实时展示。</p></div>`;
  }
}

// ── Render Doc Preview ──
function renderDocPreview() {
  const body = document.getElementById('previewBody');
  const basicFields = ['课程名称','课程代码','开课学期','授课教师','学分','学时','课程性质'];

  let basicHtml = '';
  for (const f of basicFields) {
    const val = fieldData[f] || '';
    const cls = val ? 'filled' : '';
    const display = val || '待填写';
    basicHtml += `<tr><td style="width:90px;text-align:right;font-weight:500;">${f}</td>
      <td><span class="field-placeholder ${cls}">${display}</span></td></tr>`;
  }

  let goalRows = '';
  for (let i = 1; i <= 12; i++) {
    const approach = fieldData[`实现途径${i}`] || fieldData['实现途径'] || '';
    const method = fieldData[`评价方法${i}`] || fieldData['评价方法'] || '';
    if (i <= 4 || approach || method) {
      const aCls = approach ? 'filled' : '';
      const mCls = method ? 'filled' : '';
      goalRows += `<tr>
        <td style="width:50px;">目标${i}</td>
        <td><span class="field-placeholder ${aCls}">${approach || '待填写'}</span></td>
        <td><span class="field-placeholder ${mCls}">${method || '待填写'}</span></td>
      </tr>`;
    }
  }
  if (!goalRows) {
    goalRows = `<tr><td colspan="3" style="color:var(--text-secondary);">课程目标信息收集后显示</td></tr>`;
  }

  const summary = fieldData['课程总结'] || '';
  const improve = fieldData['改进措施'] || '';

  body.innerHTML = `
    <div class="doc-page">
      <h2>${currentTemplate || '教务文档'}</h2>
      <table>
        <tr><th colspan="2" style="background:#F9FAFB;font-weight:600;color:var(--text);">基本信息</th></tr>
        ${basicHtml}
      </table>
      <table>
        <tr><th style="width:50px;">序号</th><th>实现途径</th><th>评价方法</th></tr>
        ${goalRows}
      </table>
      <table>
        <tr><td style="width:90px;text-align:right;font-weight:500;">课程总结</td>
          <td><span class="field-placeholder ${summary?'filled':''}">${summary || '待填写'}</span></td></tr>
        <tr><td style="text-align:right;font-weight:500;">改进措施</td>
          <td><span class="field-placeholder ${improve?'filled':''}">${improve || '待填写'}</span></td></tr>
      </table>
      <p style="font-size:10px;color:var(--text-muted);margin-top:16px;text-align:center;">
        HTML 预览 · 生成 Word 文档格式与模板 100% 一致
      </p>
    </div>`;
}

function downloadDoc() {
  if (currentDownloadUrl) window.open(currentDownloadUrl);
}

// ── Markdown Render ──
function renderMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/(https?:\/\/[^\s"<>]+\.docx[^\s"<>]*)/g,
    '<a class="download-link" href="$1" target="_blank">下载文档</a>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/^- (.+)$/gm, '<div style="padding-left:12px;opacity:0.9;">· $1</div>');
  html = html.replace(/^\d+\. (.+)$/gm, '<div style="padding-left:12px;">$1</div>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ── Init ──
window.addEventListener('load', () => {
  appendMessage('assistant',
    '您好！我是高校教务办公数字员工。\n\n' +
    '我可以帮您自动生成教务报告文档，格式与模板 100% 一致。\n\n' +
    '您可以：\n' +
    '· 点击下方「完全自动填写」一键启动\n' +
    '· 点击「知识文件上传」让我自动提取信息\n' +
    '· 或直接输入消息开始对话'
  );
  updateStepBar();
});

// Pulse animation for upload btn highlight
const style = document.createElement('style');
style.textContent = '@keyframes pulse { 0%,100%{transform:scale(1);box-shadow:var(--shadow)} 50%{transform:scale(1.04);box-shadow:0 0 0 6px rgba(79,70,229,0.12)} }';
document.head.appendChild(style);
</script>
</body>
